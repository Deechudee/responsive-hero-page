<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLearnHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="hero-image">
            <img src="logo.png" alt="hero image">
        </div>
        <h4 class="hero-text">DevLearnHub</h4>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Courses</a></li>
            <li><a href="#">Tutorials</a></li>
            <li><a href="#">Contact</a></li>

            <h1 >Build Amazing Web Experiences</h1>

            <div class="buttons">

        <img src="main.png" class="main" alt="Main Image">
